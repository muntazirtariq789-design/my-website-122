<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Puma Shoes Store</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    color:#222;
}

/* Header */
header{
    background:black;
    padding:20px 50px;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:white;
    font-size:35px;
    font-weight:bold;
}

nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:25px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-size:18px;
}


/* Hero Section */
.hero{
    display:flex;
    justify-content:space-around;
    align-items:center;
    padding:60px;
    background:white;
}

.hero h1{
    font-size:55px;
    margin-bottom:20px;
}

.hero p{
    font-size:20px;
    margin-bottom:25px;
}

.btn{
    background:red;
    color:white;
    padding:15px 30px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.hero img{
    width:400px;
    border-radius:20px;
}


/* Products */
.products{
    padding:40px;
    text-align:center;
}

.products h2{
    font-size:35px;
    margin-bottom:30px;
}

.container{
    display:flex;
    justify-content:center;
    gap:30px;
}

.card{
    background:white;
    width:280px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px gray;
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:10px;
}

.card h3{
    margin:15px;
}

.price{
    font-size:20px;
    color:red;
    margin-bottom:15px;
}


/* Footer */
footer{
    background:black;
    color:white;
    text-align:center;
    padding:20px;
}


/* Mobile */
@media(max-width:800px){

.hero{
    flex-direction:column;
}

.container{
    flex-direction:column;
    align-items:center;
}

.hero img{
    margin-top:30px;
    width:300px;
}

}
</style>

</head>


<body>


<header>

<nav>

<div class="logo">PUMA</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Shoes</a></li>
<li><a href="#">Collection</a></li>
<li><a href="https://docs.google.com/forms/d/e/1FAIpQLScPtuq5LZAcQvcDv1MySenIeA0vXfyUmHmIV6vLRP4e0uP4XQ/viewform?usp=header">Contact</a></li>
</ul>

</nav>

</header>



<section class="hero">

<div>
<h1>Run With Power</h1>
<p>Explore premium sports shoes designed for speed and comfort.</p>
<a href="https://in.puma.com/in/en/shop" target="_blank">
    Buy NOw
</a>

</div>


<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" 
alt="Puma Shoe">

</section>



<section class="products">

<h2>Latest Shoes</h2>


<div class="container">


<div class="card">

<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">

<h3>Speed Runner</h3>

<p class="price">$120</p>
<a href="https://in.puma.com/in/en/shop" target="_blank">
    Buy NOw
</a>

</div>



<div class="card">

<img src="https://images.unsplash.com/photo-1460353581641-37baddab0fa2">

<h3>Street Style</h3>

<p class="price">$95</p>

<a href="https://in.puma.com/in/en/shop" target="_blank">
    Buy NOw
</a>


</div>



<div class="card">

<img src="https://images.unsplash.com/photo-1495555961986-6d4c1ecb7be3">

<h3>Sport Pro</h3>

<p class="price">$150</p>

<a href="https://in.puma.com/in/en/shop" target="_blank">
    Buy NOw
</a>

</div>


</div>

</section>



<footer>

<p>© 2026 Puma Shoes Store | All Rights Reserved</p>

</footer>


</body>
</html>
